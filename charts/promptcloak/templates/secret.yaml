{{- if or .Values.serverAuth.enabled .Values.secretEnv }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "promptcloak.fullname" . }}-secret
type: Opaque
stringData:
  {{- if .Values.serverAuth.enabled }}
  PROMPTCLOAK_SERVER_API_KEY: {{ include "promptcloak.serverApiKey" . | quote }}
  {{- end }}
  {{- range $key, $value := .Values.secretEnv }}
  {{- if or (ne $key "PROMPTCLOAK_SERVER_API_KEY") (not $.Values.serverAuth.enabled) }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
{{- end }}
