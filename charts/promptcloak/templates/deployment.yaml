apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "promptcloak.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "promptcloak.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "promptcloak.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "promptcloak.name" . }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: promptcloak
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - containerPort: 8000
          env:
            {{- if .Values.serverAuth.enabled }}
            - name: PROMPTCLOAK_SERVER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "promptcloak.fullname" . }}-secret
                  key: PROMPTCLOAK_SERVER_API_KEY
            {{- end }}
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $value := .Values.secretEnv }}
            {{- if or (ne $key "PROMPTCLOAK_SERVER_API_KEY") (not $.Values.serverAuth.enabled) }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "promptcloak.fullname" $ }}-secret
                  key: {{ $key }}
            {{- end }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
