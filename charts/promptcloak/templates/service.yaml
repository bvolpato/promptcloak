apiVersion: v1
kind: Service
metadata:
  name: {{ include "promptcloak.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "promptcloak.name" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "promptcloak.name" . }}
