replicaCount: 1

image:
  repository: ghcr.io/bvolpato/promptcloak
  tag: "0.1.7"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

serverAuth:
  enabled: true
  apiKey: ""

env:
  PROMPTCLOAK_HOST: 0.0.0.0
  PROMPTCLOAK_PORT: "8000"
  PROMPTCLOAK_TARGET_DEFAULT_BASE_URL: https://api.openai.com/v1

secretEnv: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi
